<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeRoute Mapa | Medellín</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/map_style.css">
    <script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>
</head>
<body>

    <div id="mapa" style="width: 100vw; height: 100vh; position: absolute; top: 0; right: 0; z-index: 1;"></div>

   <div class="control-panel" id="panel-lateral">
        <button id="toggle-panel" class="toggle-btn" title="Ocultar/Mostrar Panel">
            <i class="fa-solid fa-chevron-left"></i>
        </button>

        <div class="panel-content">
            <div class="panel-header">
                <a href="index.html" class="btn-back" title="Volver al inicio"><i class="fa-solid fa-arrow-left"></i></a>
                <h2>Navegación</h2>
            </div>

            <div class="input-group">
                <label><i class="fa-solid fa-microchip" style="color: #6b7280;"></i> Algoritmo a utilizar</label>
                <select id="algo-select" class="custom-select">
                    <option value="both">Ambos (Comparación Visual)</option>
                    <option value="greedy">Greedy (Más rápido, menos óptimo)</option>
                    <option value="astar">A* (Más lento, ruta óptima)</option>
                </select>
            </div>

            <div class="input-group" style="background: #f3f4f6; padding: 10px; border-radius: 8px; margin-bottom: 15px;">
                <label style="font-weight: 600; font-size: 0.85rem; color: #374151;"><i class="fa-solid fa-tree-city" style="color: #059669;"></i> Atajos por Barrios</label>
                <div style="display: flex; gap: 8px; margin-top: 5px;">
                    <select id="barrio-origen-select" class="custom-select" style="font-size: 0.8rem; padding: 5px;">
                        <option value="">-- Origen barrio --</option>
                        <option value="6.2100,-75.5650">El Poblado</option>
                        <option value="6.2625,-75.5510">Manrique</option>
                        <option value="6.2442,-75.5714">Centro</option>
                        <option value="6.2505,-75.5900">Laureles</option>
                        <option value="6.2307,-75.5898">Belén</option>
                    </select>
                    <select id="barrio-destino-select" class="custom-select" style="font-size: 0.8rem; padding: 5px;">
                        <option value="">-- Destino barrio --</option>
                        <option value="6.2100,-75.5650">El Poblado</option>
                        <option value="6.2625,-75.5510">Manrique</option>
                        <option value="6.2442,-75.5714">Centro</option>
                        <option value="6.2505,-75.5900">Laureles</option>
                        <option value="6.2307,-75.5898">Belén</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label><i class="fa-solid fa-location-dot" style="color: #2563eb;"></i> Origen (Escribe, GPS o mapa)</label>
                <div class="location-controls">
                    <input type="text" id="origen-input" placeholder="Ej: 6.2442, -75.5812">
                    <button id="btn-gps-origen" class="icon-btn gps-btn"><i class="fa-solid fa-crosshairs"></i></button>
                </div>
            </div>

            <div class="input-group">
                <label><i class="fa-solid fa-location-dot" style="color: #ef4444;"></i> Destino (Escribe, GPS o mapa)</label>
                <div class="location-controls">
                    <input type="text" id="destino-input" placeholder="Ej: 6.2518, -75.5684">
                    <button id="btn-gps-destino" class="icon-btn gps-btn"><i class="fa-solid fa-crosshairs"></i></button>
                </div>
            </div>

            <button id="btn-limpiar" class="btn-secondary-small"><i class="fa-solid fa-trash-can"></i> Limpiar Mapa</button>

            <hr>

            <div class="input-group" style="margin-bottom: 15px;">
                <label><i class="fa-solid fa-layer-group" style="color: #4b5563;"></i> Capas y Visualización</label>
                <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 8px; font-size: 0.9rem;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="checkbox" id="chk-mapa-calor">
                        <span><i class="fa-solid fa-fire" style="color: #dc2626;"></i> Ver Mapa de Calor (Riesgo CSV)</span>
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="checkbox" id="chk-animar-ruta" checked>
                        <span><i class="fa-solid fa-film" style="color: #d97706;"></i> Mostrar Animación de búsqueda</span>
                    </label>
                </div>
            </div>

            <div class="sliders-container">
                <div class="slider-group">
                    <label>Preferencia de Ruta: <span id="pref-value">Balanceada</span></label>
                    <input type="range" id="ruta-slider" min="0" max="1" step="0.1" value="0.5">
                    <div class="slider-labels">
                        <span><i class="fa-solid fa-bolt"></i> + Rápida</span>
                        <span><i class="fa-solid fa-shield-halved"></i> + Segura</span>
                    </div>
                </div>
            </div>

            <button id="btn-calcular" class="btn-main"><i class="fa-solid fa-route"></i> Calcular Ruta Segura</button>

            <button id="btn-saltar-animacion" class="btn-main hidden" style="background-color: #d97706; margin-top: 8px;">
                <i class="fa-solid fa-forward"></i> Mostrar ya de una
            </button>

            <hr>

            <div class="emergency-section">
                <p class="emergency-title">Zona de Emergencia</p>
                <div class="emergency-buttons">
                    <button id="btn-cai" class="btn-emergency cai"><i class="fa-solid fa-shield-halved"></i> CAI</button>
                    <button id="btn-hosp" class="btn-emergency hosp"><i class="fa-solid fa-truck-medical"></i> Hospital</button>
                </div>
            </div>

            <div id="stats-panel" class="stats-panel hidden">
                <h4><i class="fa-solid fa-chart-pie"></i> Rendimiento</h4>
                <p id="wrap-astar"><strong>A*:</strong> <span id="stat-astar">0</span> ms | Nodos: <span id="nodes-astar">0</span></p>
                <p id="wrap-greedy"><strong>Greedy:</strong> <span id="stat-greedy">0</span> ms | Nodos: <span id="nodes-greedy">0</span></p>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/api.js"></script>
    <script src="js/map.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
